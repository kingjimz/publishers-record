<div class="flex flex-col min-h-screen bg-slate-100">
  @if (onboarding.dialogOpen()) {
    <app-onboarding-welcome />
  }

  <header class="page-header sticky top-0 z-10 py-4 px-4 sm:px-8">
    <div class="max-w-7xl mx-auto flex items-center justify-between gap-6 flex-wrap">
      <div class="flex flex-col gap-0.5">
        <p class="font-bold text-lg text-white tracking-tight">Publishers Record</p>
        <p class="text-xs font-normal text-white/55">Bolaoen Congregation</p>
      </div>

      <nav class="hidden sm:flex items-center gap-1">
        <a routerLink="/dashboard" routerLinkActive="bg-white/20"
          class="px-3 py-2 rounded-lg text-sm text-primary-50/90 hover:bg-white/10 transition-colors">
          Dashboard
        </a>
        <a routerLink="/add-records" routerLinkActive="bg-white/20"
          class="px-3 py-2 rounded-lg text-sm text-primary-50/90 hover:bg-white/10 transition-colors">
          Add Records
        </a>
        <a routerLink="/search-records" routerLinkActive="bg-white/20"
          class="px-3 py-2 rounded-lg text-sm text-primary-50/90 hover:bg-white/10 transition-colors">
          Search
        </a>
        <button type="button"
          class="px-3 py-2 rounded-lg text-sm text-primary-50/90 hover:bg-white/10 transition-colors"
          (click)="onboarding.openHelp()">
          How to use
        </button>
      </nav>

      <div class="flex items-center gap-3">
        <div class="relative flex">
          <button type="button" (click)="toggleHeaderMenu()"
            class="flex items-center gap-2 px-3 py-2.5 md:pl-4 md:pr-3 rounded-lg text-primary-50/90 hover:bg-white/10 border border-white/30 text-sm"
            [attr.aria-expanded]="headerMenuOpen" aria-haspopup="true" aria-label="Account menu">
            <span class="hidden md:inline">{{ supabase.userEmail() }}</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0 transition-transform"
              [class.rotate-180]="headerMenuOpen" fill="none" viewBox="0 0 24 24" stroke="currentColor"
              stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
            </svg>
          </button>

          @if (headerMenuOpen) {
            <div class="fixed inset-0 z-20" (click)="closeHeaderMenu()" aria-hidden="true"></div>
            <div class="absolute right-0 top-full mt-2 z-30 w-56 rounded-lg bg-white border border-gray-200 shadow-lg py-2">
              <div class="sm:hidden border-b border-gray-100 pb-2 mb-2">
                <a routerLink="/dashboard" (click)="closeHeaderMenu()"
                  class="block w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-100">
                  Dashboard
                </a>
                <a routerLink="/add-records" (click)="closeHeaderMenu()"
                  class="block w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-100">
                  Add Records
                </a>
                <a routerLink="/search-records" (click)="closeHeaderMenu()"
                  class="block w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-100">
                  Search
                </a>
              </div>
              @if (supabase.userEmail()) {
                <div class="px-4 py-2 text-xs text-gray-400 md:hidden">{{ supabase.userEmail() }}</div>
              }
              <button type="button"
                class="w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-100 flex items-center gap-2"
                (click)="closeHeaderMenu(); onboarding.openHelp()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0 text-primary-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                How to use
              </button>
              <button type="button"
                class="w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-100 flex items-center gap-2"
                (click)="onSignOut()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                  stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                Sign out
              </button>
            </div>
          }
        </div>
      </div>
    </div>
  </header>

  <main class="flex-1 min-h-0 flex flex-col min-w-0 overflow-x-hidden">
    <div
      class="flex-1 flex flex-col min-h-0 layout-route-shell"
      [@layoutRouteAnimations]="routeAnimation(outlet)">
      <router-outlet #outlet="outlet" />
    </div>
  </main>
</div>

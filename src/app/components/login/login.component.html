<div class="h-screen overflow-hidden bg-slate-50 flex flex-col items-center justify-center px-6 py-6">
  <div class="w-full max-w-sm mx-auto flex-shrink-0">
    <div class="mb-10">
      <h1 class="text-2xl font-semibold text-slate-900 tracking-tight">Congregtion's Publisher Record</h1>
      <p class="mt-1.5 text-sm text-slate-500">Sign in to your account</p>
    </div>

    <form (ngSubmit)="onLogin()" class="space-y-5">
      <div>
        <label for="login-email" class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
        <input
          id="login-email"
          type="email"
          class="w-full px-3 py-2.5 border border-slate-200 bg-white text-slate-900 rounded-lg focus:border-primary-500 focus:ring-1 focus:ring-primary-500 outline-none transition-colors"
          [(ngModel)]="email"
          name="email"
          required
          autocomplete="email"
          placeholder="you@example.com"
        />
      </div>

      <div>
        <label for="login-password" class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
        <input
          id="login-password"
          type="password"
          class="w-full px-3 py-2.5 border border-slate-200 bg-white text-slate-900 rounded-lg focus:border-primary-500 focus:ring-1 focus:ring-primary-500 outline-none transition-colors"
          [(ngModel)]="password"
          name="password"
          required
          autocomplete="current-password"
          placeholder="Enter your password"
        />
      </div>

      <button type="submit"
        class="w-full py-3 text-sm font-medium text-white bg-primary-500 hover:bg-primary-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 disabled:opacity-60 transition-colors"
        [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-slate-600">
      <a routerLink="/forgot-password" class="text-primary-600 hover:text-primary-700 font-medium">Forgot password?</a>
    </p>
  </div>
</div>

<main class="auth-page">
  <section class="promo-panel">
    <p class="eyebrow">Publishers Record</p>
    <h1>Welcome back.</h1>
    <p class="subtitle">
      Manage titles, contracts, and royalty insights from one clean workspace.
    </p>
  </section>

  <section class="auth-card-container">
    <form class="auth-card">
      <h2>Sign in</h2>
      <p class="description">Use your email and password to continue.</p>

      <label for="login-email">Email</label>
      <input id="login-email" type="email" placeholder="you@company.com" autocomplete="email" />

      <label for="login-password">Password</label>
      <input
        id="login-password"
        type="password"
        placeholder="Enter your password"
        autocomplete="current-password"
      />

      <button type="submit">Sign in</button>

      <p class="switch-link">
        New here?
        <a routerLink="/signup">Create an account</a>
      </p>
    </form>
  </section>
</main>

<main class="auth-page">
  <section class="promo-panel">
    <p class="eyebrow">Get started</p>
    <h1>Create your workspace.</h1>
    <p class="subtitle">
      Set up your account in minutes and start organizing your publishing operations.
    </p>
  </section>

  <section class="auth-card-container">
    <form class="auth-card">
      <h2>Sign up</h2>
      <p class="description">Create an account to access your dashboard.</p>

      <label for="signup-name">Full name</label>
      <input id="signup-name" type="text" placeholder="Jane Doe" autocomplete="name" />

      <label for="signup-email">Email</label>
      <input id="signup-email" type="email" placeholder="you@company.com" autocomplete="email" />

      <label for="signup-password">Password</label>
      <input
        id="signup-password"
        type="password"
        placeholder="Create a strong password"
        autocomplete="new-password"
      />

      <button type="submit">Create account</button>

      <p class="switch-link">
        Already have an account?
        <a routerLink="/login">Sign in</a>
      </p>
    </form>
  </section>
</main>

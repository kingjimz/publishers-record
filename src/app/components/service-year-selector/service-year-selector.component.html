<div class="inline-flex items-center gap-1">
  <button type="button"
    class="p-2 rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors"
    (click)="onPrevious()" title="Previous service year" aria-label="Previous service year">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
    </svg>
  </button>

  <span class="px-3 py-1.5 text-sm font-medium text-gray-900 min-w-[120px] text-center">
    Sep {{ supabase.serviceYear() }} – Aug {{ supabase.serviceYear() + 1 }}
  </span>

  <button type="button"
    class="p-2 rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors
      disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:bg-transparent disabled:text-gray-400 disabled:border-gray-200"
    [disabled]="nextDisabled()"
    (click)="onNext()"
    [attr.title]="nextDisabled() ? 'Future service years are not available' : 'Next service year'"
    [attr.aria-label]="nextDisabled() ? 'Next service year (unavailable)' : 'Next service year'">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
    </svg>
  </button>
</div>
